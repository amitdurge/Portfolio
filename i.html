<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 200vh;
        }

        /* Navbar */
        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: all 0.4s ease;
            background: transparent;
            padding: 20px 0;
        }

        /* Scroll Effect */
        #navbar.scrolled {
            background: #ffffff;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 12px 0;
        }

        /* Container */
        .nav__bar {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo */
        .nav__logo h5 {
            font-size: 22px;
            color: white;
            transition: 0.4s;
        }

        #navbar.scrolled .nav__logo h5 {
            color: #222;
        }

        /* Menu Links */
        .nav__links {
            display: flex;
            align-items: center;
            gap: 25px;
            list-style: none;
        }

        .nav__links a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav__links a:hover {
            color: #0d6efd;
        }

        #navbar.scrolled .nav__links a {
            color: #222;
        }

        #navbar.scrolled .nav__links a:hover {
            color: #0d6efd;
        }

        /* Contact Button */
        .contact-btn {
            background: #0d6efd;
            color: white !important;
            padding: 10px 22px;
            border-radius: 30px;
        }

        .contact-btn:hover {
            background: #084fc7;
        }

        /* Mobile Menu Button */
        .nav__menu__btn {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }

        /* Mobile Responsive */
        @media(max-width:768px) {

            .nav__menu__btn {
                display: block;
                color: white;
            }

            #navbar.scrolled .nav__menu__btn {
                color: #222;
            }

            .nav__links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: white;
                flex-direction: column;
                padding: 20px 0;
                display: none;
            }

            .nav__links.show {
                display: flex;
            }

            .nav__links a {
                color: #222 !important;
            }
        }
    </style>
</head>

<body>
    <nav id="navbar">
        <div class="nav__bar">
            <div class="nav__header">
                <div class="nav__logo">
                    <a href="#">
                        <h5>Welcome to My Portfolio !!</h5>
                    </a>
                </div>

                <div class="nav__menu__btn" id="menu-btn">
                    <span>☰</span>
                </div>
            </div>

            <ul class="nav__links" id="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#project">Projects</a></li>
                <li><a href="#service">Skills</a></li>
                <li><a href="#blog">Posts</a></li>
                <li><a href="#contact" class="contact-btn">Contact</a></li>
            </ul>
        </div>

        <script>
            // Navbar Scroll Effect
            window.addEventListener("scroll", () => {
                const navbar = document.getElementById("navbar");

                if (window.scrollY > 50) {
                    navbar.classList.add("scrolled");
                } else {
                    navbar.classList.remove("scrolled");
                }
            });

            // Mobile Menu Toggle
            const menuBtn = document.getElementById("menu-btn");
            const navLinks = document.getElementById("nav-links");

            menuBtn.addEventListener("click", () => {
                navLinks.classList.toggle("show");
            });
        </script>
    </nav>
</body>

</html>
